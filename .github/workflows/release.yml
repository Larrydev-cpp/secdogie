name: release

# Builds downloadable binaries and attaches them to a GitHub Release.
# Triggers when you push a version tag (e.g. `git tag v0.1.0 && git push --tags`),
# or manually from the Actions tab (workflow_dispatch) for a dry run that only
# builds artifacts without publishing a release.

on:
  push:
    # Semantic version tags only (v1.2.3, v1.2.3-rc1, ...). Deliberately NOT
    # "v*" -- that also matches non-version tags/branches merged as tags
    # (e.g. a tag literally named "version"), triggering an accidental release.
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

jobs:
  # --- Python agent: one single-file executable per OS -----------------------
  build-agent:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: agent-linux-x86_64
          - os: windows-latest
            asset: agent-windows-x86_64
          - os: macos-latest
            asset: agent-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build single-file executable
        shell: bash
        working-directory: agent
        run: |
          python -m pip install --upgrade pip
          pip install -e . pyinstaller
          cd packaging
          pyinstaller secdogie-agent.spec --distpath ./dist --workpath ./build --noconfirm

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p staging
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp agent/packaging/dist/secdogie-agent.exe "staging/${{ matrix.asset }}.exe"
          else
            cp agent/packaging/dist/secdogie-agent "staging/${{ matrix.asset }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: staging/*

  # --- Python android/ios/open/scene3d: each needs agent/ installed first,
  # same one-executable-per-OS shape as build-agent. ---------------------------
  build-android:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: android-linux-x86_64
          - os: windows-latest
            asset: android-windows-x86_64
          - os: macos-latest
            asset: android-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build single-file executable
        shell: bash
        working-directory: android
        run: |
          python -m pip install --upgrade pip
          pip install -e ../agent
          pip install -e . pyinstaller
          cd packaging
          pyinstaller secdogie-android.spec --distpath ./dist --workpath ./build --noconfirm

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p staging
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp android/packaging/dist/secdogie-android.exe "staging/${{ matrix.asset }}.exe"
          else
            cp android/packaging/dist/secdogie-android "staging/${{ matrix.asset }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: staging/*

  build-ios:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: ios-linux-x86_64
          - os: windows-latest
            asset: ios-windows-x86_64
          - os: macos-latest
            asset: ios-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build single-file executable
        shell: bash
        working-directory: ios
        run: |
          python -m pip install --upgrade pip
          pip install -e ../agent
          pip install -e . pyinstaller
          cd packaging
          pyinstaller secdogie-ios.spec --distpath ./dist --workpath ./build --noconfirm

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p staging
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp ios/packaging/dist/secdogie-ios.exe "staging/${{ matrix.asset }}.exe"
          else
            cp ios/packaging/dist/secdogie-ios "staging/${{ matrix.asset }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: staging/*

  build-open:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: open-linux-x86_64
          - os: windows-latest
            asset: open-windows-x86_64
          - os: macos-latest
            asset: open-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build single-file executable
        shell: bash
        working-directory: open
        run: |
          python -m pip install --upgrade pip
          pip install -e ../agent
          pip install -e . pyinstaller
          cd packaging
          pyinstaller secdogie-open.spec --distpath ./dist --workpath ./build --noconfirm

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p staging
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp open/packaging/dist/secdogie-open.exe "staging/${{ matrix.asset }}.exe"
          else
            cp open/packaging/dist/secdogie-open "staging/${{ matrix.asset }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: staging/*

  build-scene3d:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: scene3d-linux-x86_64
          - os: windows-latest
            asset: scene3d-windows-x86_64
          - os: macos-latest
            asset: scene3d-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build single-file executable
        shell: bash
        working-directory: scene3d
        run: |
          python -m pip install --upgrade pip
          pip install -e ../agent
          # Bundle both providers, matching packaging/build.sh, so the built
          # binary can use either --provider without a rebuild.
          pip install -e '.[openai]' anthropic pyinstaller
          cd packaging
          pyinstaller secdogie-scene3d.spec --distpath ./dist --workpath ./build --noconfirm

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p staging
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp scene3d/packaging/dist/secdogie-scene3d.exe "staging/${{ matrix.asset }}.exe"
          else
            cp scene3d/packaging/dist/secdogie-scene3d "staging/${{ matrix.asset }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: staging/*

  # --- C tunnel: Linux-only (uses the Linux TUN device / ioctl API) ----------
  build-tunnel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake libsodium-dev pkg-config

      - name: Build
        working-directory: tunnel
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build -j

      - name: Run unit tests
        working-directory: tunnel
        run: ./build/test_protocol

      - name: Stage artifact
        run: |
          mkdir -p staging
          cp tunnel/build/secdogie-tunnel staging/secdogie-tunnel-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: tunnel-linux-x86_64
          path: staging/*

  # --- Publish: gather everything, zip with docs, attach to the Release ------
  release:
    needs: [build-agent, build-android, build-ios, build-open, build-scene3d, build-tunnel]
    runs-on: ubuntu-latest
    # Only publish an actual Release for tag pushes; a manual run just builds.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: Package each binary with its docs into a zip
        run: |
          set -euo pipefail
          mkdir -p release
          version="${GITHUB_REF_NAME}"

          # package <zip-base-name> <source-binary> <inner-binary-name> <doc-file...>
          package() {
            local name="$1"; local binary="$2"; local inner="$3"; shift 3
            local dir="pkg/${name}"
            rm -rf "$dir" && mkdir -p "$dir"
            cp "$binary" "$dir/${inner}"
            [ -f "$dir/${inner}" ] && [ -x "$binary" ] && chmod +x "$dir/${inner}" || true
            for d in "$@"; do cp "$d" "$dir/"; done
            # keep shell launchers executable inside the zip
            chmod +x "$dir"/*.command "$dir"/*.sh 2>/dev/null || true
            (cd pkg && zip -r "../release/${name}.zip" "${name}")
          }

          # Agent binaries (one per platform). Keep .exe on Windows so it runs;
          # give it a clean inner name regardless of the artifact's own name.
          # Bundle the matching double-click launcher so non-technical users can
          # just run open.bat / open.command / run.sh.
          for f in downloaded/agent-*/*; do
            base="$(basename "$f")"                    # agent-linux-x86_64 | agent-windows-x86_64.exe | agent-macos-arm64
            platform="${base#agent-}"; platform="${platform%.exe}"
            # `extra` carries any additional launcher assets beyond the main one
            # (Windows ships menu.ps1, the acrylic selection window open.bat calls).
            extra=""
            case "$base" in
              *windows*) inner="secdogie-agent.exe"; launcher="agent/packaging/launchers/open.bat"; extra="agent/packaging/launchers/menu.ps1" ;;
              *macos*)   inner="secdogie-agent";     launcher="agent/packaging/launchers/open.command" ;;
              *)         inner="secdogie-agent";     launcher="agent/packaging/launchers/run.sh" ;;
            esac
            package "secdogie-agent-${platform}-${version}" "$f" "$inner" \
              "$launcher" ${extra} agent/README.md agent/packaging/README.md LICENSE
          done

          # android/ios/open/scene3d binaries (one per platform each), same
          # shape as agent above.
          for f in downloaded/android-*/*; do
            base="$(basename "$f")"
            platform="${base#android-}"; platform="${platform%.exe}"
            case "$base" in
              *.exe) inner="secdogie-android.exe" ;;
              *)     inner="secdogie-android" ;;
            esac
            package "secdogie-android-${platform}-${version}" "$f" "$inner" \
              android/README.md LICENSE
          done

          for f in downloaded/ios-*/*; do
            base="$(basename "$f")"
            platform="${base#ios-}"; platform="${platform%.exe}"
            case "$base" in
              *.exe) inner="secdogie-ios.exe" ;;
              *)     inner="secdogie-ios" ;;
            esac
            package "secdogie-ios-${platform}-${version}" "$f" "$inner" \
              ios/README.md LICENSE
          done

          for f in downloaded/open-*/*; do
            base="$(basename "$f")"
            platform="${base#open-}"; platform="${platform%.exe}"
            case "$base" in
              *.exe) inner="secdogie-open.exe" ;;
              *)     inner="secdogie-open" ;;
            esac
            package "secdogie-open-${platform}-${version}" "$f" "$inner" \
              open/README.md LICENSE
          done

          for f in downloaded/scene3d-*/*; do
            base="$(basename "$f")"
            platform="${base#scene3d-}"; platform="${platform%.exe}"
            case "$base" in
              *.exe) inner="secdogie-scene3d.exe" ;;
              *)     inner="secdogie-scene3d" ;;
            esac
            package "secdogie-scene3d-${platform}-${version}" "$f" "$inner" \
              scene3d/README.md LICENSE
          done

          # Tunnel binary (Linux only).
          for f in downloaded/tunnel-*/*; do
            package "secdogie-tunnel-linux-x86_64-${version}" "$f" "secdogie-tunnel" \
              tunnel/README.md tunnel/PROTOCOL.md LICENSE
          done

          ls -la release

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Idempotent: a re-run (retry, or re-pushing the same tag after
          # deleting/recreating it) must not fail just because a release for
          # this tag already exists -- replace it rather than erroring out.
          # --cleanup-tag is deliberately omitted: it would delete the tag
          # that triggered this very run.
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists -- deleting it before recreating"
            gh release delete "$tag" --yes
          fi
          gh release create "$tag" \
            release/*.zip \
            --title "$tag" \
            --generate-notes
